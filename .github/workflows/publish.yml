name: Publish to ESP Registry

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Build gate — verify the component compiles for all supported targets
  # before publishing to the ESP Component Registry.
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target: [esp32, esp32c3, esp32s3]
    container:
      image: espressif/idf:v5.5.3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build basic_test example
        working-directory: examples/basic_test
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Build selftest example
        working-directory: examples/selftest
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build

  upload_component:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Strips the 'v' from the tag (e.g. v1.0.1 -> 1.0.1)
      - name: Get Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "lugilugi"
          components: "can_driver:."
          api_token: "${{ secrets.IDF_COMPONENT_API_TOKEN }}"
          # Injects the cleaned version from the step above
          version: "${{ steps.get_version.outputs.VERSION }}"